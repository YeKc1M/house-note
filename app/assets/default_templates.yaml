templates:
  - id: community_template
    name: 小区模板
    dimensions:
      - name: 地址
        type: text
      - name: 建成年份
        type: number
      - name: 通勤
        type: text
      - name: 周边
        type: text
      - name: 物业费
        type: number
      - name: 房子
        type: ref_subtemplate
        ref_template_id: house_template

  - id: house_template
    name: 房子模板
    dimensions:
      - name: 房租
        type: number
      - name: 梯户
        type: text
      - name: 户型
        type: text
      - name: 民水民电
        type: single_choice
        options: [是, 否]
      - name: 安静
        type: single_choice
        options: [是, 否]
      - name: 邻居
        type: text
      - name: 电梯
        type: single_choice
        options: [有, 无]
      - name: 能否听到电梯声音
        type: single_choice
        options: [是, 否]
      - name: 客厅
        type: ref_subtemplate
        ref_template_id: living_room_template
      - name: 卧室
        type: ref_subtemplate
        ref_template_id: bedroom_template
      - name: 洗衣机状态
        type: text
      - name: 微波炉状态
        type: text

  - id: living_room_template
    name: 客厅模板
    dimensions:
      - name: 电视状态
        type: text
      - name: 空调状态
        type: text

  - id: bedroom_template
    name: 卧室模板
    dimensions:
      - name: 空调状态
        type: text
      - name: 床垫状态
        type: text
